name: Emulator UI Screenshots

on:
  pull_request:
    paths:
      - 'app/src/main/**'
      - 'app/src/androidTest/**'
      - '.github/workflows/ui-screenshots.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove empty setup bottom bar
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/opencode/android/feature/onboarding/AndroidSetupScreen.kt')
          text = path.read_text()
          old = '''        bottomBar = {
            SetupBottomBar(
                currentStep = currentStep,
                primaryAction = primaryAction,
                onBackStep = { currentStep -= 1 }
            )
        }
'''
          new = '''        bottomBar = {
            if (primaryAction != null) {
                SetupBottomBar(
                    currentStep = currentStep,
                    primaryAction = primaryAction,
                    onBackStep = { currentStep -= 1 }
                )
            }
        }
'''
          if text.count(old) != 1:
              raise SystemExit('Android setup bottom-bar anchor was not found exactly once')
          path.write_text(text.replace(old, new, 1))
          PY

          git show HEAD^:.github/workflows/ui-screenshots.yml > .github/workflows/ui-screenshots.yml

      - name: Commit source fix and restore screenshot workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/src/main/java/com/opencode/android/feature/onboarding/AndroidSetupScreen.kt \
            .github/workflows/ui-screenshots.yml
          git diff --cached --check
          git commit -m 'fix: hide empty Android setup action bar'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
