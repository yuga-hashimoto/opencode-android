name: Emulator UI Screenshots

on:
  pull_request:
    paths:
      - 'app/src/main/**'
      - 'app/src/androidTest/**'
      - '.github/workflows/ui-screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Skip screenshot-generated commit
        id: guard
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -q '\[ui-screenshots\]'; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Android SDK
        if: steps.guard.outputs.skip != 'true'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: steps.guard.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Capture API 34 emulator screenshots
        id: emulator
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          exec > "$GITHUB_WORKSPACE/ui-screenshot-test.log" 2>&1

          AVD_NAME='opencode-ui-api34'
          SYSTEM_IMAGE='system-images;android-34;google_apis;x86_64'
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          EMULATOR_PID=''

          cleanup() {
            if adb devices | grep -q '^emulator-'; then
              adb emu kill || true
            fi
            if test -n "$EMULATOR_PID"; then
              kill "$EMULATOR_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          echo 'Installing API 34 emulator components...'
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install \
            'platform-tools' \
            'emulator' \
            "$SYSTEM_IMAGE"

          echo 'Creating AVD...'
          mkdir -p "$ANDROID_AVD_HOME"
          printf 'no\n' | avdmanager create avd \
            --force \
            --name "$AVD_NAME" \
            --package "$SYSTEM_IMAGE" \
            --device 'pixel_6'

          echo 'Available AVDs:'
          "$SDK_ROOT/emulator/emulator" -list-avds
          "$SDK_ROOT/emulator/emulator" -list-avds | grep -Fxq "$AVD_NAME"

          echo 'Starting emulator...'
          "$SDK_ROOT/emulator/emulator" \
            -avd "$AVD_NAME" \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -camera-back none \
            -no-snapshot-save \
            > "$GITHUB_WORKSPACE/emulator.log" 2>&1 &
          EMULATOR_PID=$!

          timeout 300 adb wait-for-device
          timeout 600 bash -c '
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do
              sleep 5
            done
          '
          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

          echo 'Running screenshot instrumentation test...'
          ./gradlew connectedDebugAndroidTest \
            -Pandroid.testInstrumentationRunnerArguments.class=com.opencode.android.ui.UiScreenshotInstrumentedTest

          echo 'Collecting screenshots...'
          mkdir -p docs/ui-screenshots/pr-4
          for image in 01-chat-empty.png 02-runtime-not-ready.png 03-drawer.png 04-settings.png; do
            adb exec-out run-as com.opencode.android cat "files/ui-screenshots/$image" \
              > "docs/ui-screenshots/pr-4/$image"
            test -s "docs/ui-screenshots/pr-4/$image"
          done

          echo 'Screenshot capture completed.'

      - name: Report screenshot failure
        if: steps.guard.outputs.skip != 'true' && steps.emulator.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '## API 34 emulator screenshot failure'
            echo
            echo '```text'
            if test -f ui-screenshot-test.log; then
              tail -n 240 ui-screenshot-test.log
            else
              echo 'The emulator workflow failed before producing a diagnostic log.'
            fi
            if test -f emulator.log; then
              echo
              echo '--- emulator.log ---'
              tail -n 100 emulator.log
            fi
            echo '```'
          } > /tmp/ui-screenshot-failure.md
          if test -n "$PR_NUMBER"; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/ui-screenshot-failure.md
          fi
          exit 1

      - name: Upload emulator screenshots
        if: steps.guard.outputs.skip != 'true' && steps.emulator.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: emulator-ui-screenshots
          path: docs/ui-screenshots/pr-4/*.png
          if-no-files-found: error

      - name: Commit screenshots to PR branch
        if: steps.guard.outputs.skip != 'true' && steps.emulator.outcome == 'success' && github.event_name == 'pull_request'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/ui-screenshots/pr-4
          if git diff --cached --quiet; then
            echo 'Screenshots are unchanged.'
            exit 0
          fi
          git commit -m 'docs: add emulator UI screenshots [ui-screenshots]'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
