name: Emulator UI Screenshots

on:
  pull_request:
    paths:
      - 'app/src/main/**'
      - 'app/src/androidTest/**'
      - '.github/workflows/ui-screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Skip screenshot-generated commit
        id: guard
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -q '\[ui-screenshots\]'; then
            echo 'skip=true' >> "$GITHUB_OUTPUT"
          else
            echo 'skip=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Gradle
        if: steps.guard.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Capture API 34 emulator screenshots
        id: emulator
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -o pipefail
            ./gradlew connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class=com.opencode.android.ui.UiScreenshotInstrumentedTest \
              > "$GITHUB_WORKSPACE/ui-screenshot-test.log" 2>&1
            mkdir -p docs/ui-screenshots/pr-4
            for image in 01-chat-empty.png 02-runtime-not-ready.png 03-drawer.png 04-settings.png; do
              adb exec-out run-as com.opencode.android cat "files/ui-screenshots/$image" \
                > "docs/ui-screenshots/pr-4/$image"
              test -s "docs/ui-screenshots/pr-4/$image"
            done

      - name: Report screenshot failure
        if: steps.guard.outputs.skip != 'true' && steps.emulator.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '## API 34 emulator screenshot failure'
            echo
            echo '```text'
            if test -f ui-screenshot-test.log; then
              tail -n 180 ui-screenshot-test.log
            else
              echo 'The emulator runner failed before the Gradle screenshot command produced a log.'
            fi
            echo '```'
          } > /tmp/ui-screenshot-failure.md
          if test -n "$PR_NUMBER"; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/ui-screenshot-failure.md
          fi
          exit 1

      - name: Upload emulator screenshots
        if: steps.guard.outputs.skip != 'true' && steps.emulator.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: emulator-ui-screenshots
          path: docs/ui-screenshots/pr-4/*.png
          if-no-files-found: error

      - name: Commit screenshots to PR branch
        if: steps.guard.outputs.skip != 'true' && steps.emulator.outcome == 'success' && github.event_name == 'pull_request'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/ui-screenshots/pr-4
          if git diff --cached --quiet; then
            echo 'Screenshots are unchanged.'
            exit 0
          fi
          git commit -m 'docs: add emulator UI screenshots [ui-screenshots]'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
