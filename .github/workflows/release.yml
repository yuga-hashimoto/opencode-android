name: Release

on:
  push:
    branches: [feature/initial-mvp, main]
    paths:
      - '.release-version'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.2.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache generated Android runtime
        uses: actions/cache@v4
        with:
          path: |
            build/generated/runtime-assets
            build/generated/runtime-jni
          key: opencode-android-runtime-${{ runner.os }}-${{ hashFiles('runtime_tools/termux_assets.lock.json', 'runtime_tools/termux_assets.py', 'scripts/prepare_android_runtime_*.py') }}

      - name: Resolve and validate tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="$(tr -d '[:space:]' < .release-version)"
          fi
          VERSION_NAME="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          test -n "$VERSION_NAME"
          test "$TAG" = "v$VERSION_NAME"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Test and build APKs
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease

      - name: Update tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f "$TAG" "${{ github.sha }}"
          git push origin "refs/tags/$TAG" --force

          cat > /tmp/release-notes.md <<'EOF'
          ## OpenCode Android v0.2.0

          チャット中心のモバイルUIへ再設計し、初回セットアップと実行環境の選択導線を刷新しました。

          ### 主な変更
          - チャットを中心にした画面構成とナビゲーションドロワー
          - Androidローカル実行／PC・Macリモート接続の初回セットアップ
          - モデル、エージェント、ワークスペース、実行先の選択UI
          - プロバイダAPIキー、音声、ランタイム、接続設定の整理
          - 未設定・破損状態でチャットへ進ませない起動時ガード
          - API 34エミュレータによる主要10画面のUI検証

          ### 配布物
          - Debug APK
          - Unsigned Release APK

          Release APKは未署名です。正式配布用には署名が必要です。
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md
          fi

          cp app/build/outputs/apk/debug/app-debug.apk "opencode-android-$TAG-debug.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk "opencode-android-$TAG-release-unsigned.apk"
          gh release upload "$TAG" --clobber \
            "opencode-android-$TAG-debug.apk" \
            "opencode-android-$TAG-release-unsigned.apk"

      - name: Record successful release
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          printf 'tag=%s\nsource_sha=%s\nworkflow_run=%s\n' \
            "$TAG" "${{ github.sha }}" "${{ github.run_id }}" > .last-release
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .last-release
          git commit -m "chore: record $TAG release"
          git push origin "HEAD:${{ github.ref_name }}"
