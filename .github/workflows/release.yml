name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes
