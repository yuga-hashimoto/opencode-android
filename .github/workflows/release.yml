name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build signed APK
        run: ./gradlew assembleRelease
        env:
          OPENCODE_STORE_FILE: app/release.keystore
          OPENCODE_STORE_PASSWORD: opencode123
          OPENCODE_KEY_ALIAS: opencode-android
          OPENCODE_KEY_PASSWORD: opencode123

      - name: Upload APK to release
        run: |
          gh release upload ${{ github.ref_name }} app/build/outputs/apk/release/app-release.apk --clobber
        env:
          GH_TOKEN: ${{ github.token }}
