name: Android CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache generated Android runtime
        uses: actions/cache@v4
        with:
          path: |
            build/generated/runtime-assets
            build/generated/runtime-jni
          key: opencode-android-runtime-${{ runner.os }}-${{ hashFiles('runtime_tools/termux_assets.lock.json', 'runtime_tools/termux_assets.py', 'scripts/prepare_android_runtime_*.py') }}

      - name: Validate runtime build scripts
        run: |
          python -m py_compile \
            runtime_tools/termux_assets.py \
            scripts/prepare_android_runtime_assets.py \
            scripts/prepare_android_runtime_native_libs.py
          python scripts/prepare_android_runtime_assets.py --help >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          lock = json.loads(Path('runtime_tools/termux_assets.lock.json').read_text())
          assert lock['version'] == 1
          assert {'arm64-v8a', 'x86_64'} == set(lock['architectures'])
          assert all(item['packages'] for item in lock['architectures'].values())
          PY

      - name: Test, lint and build APKs
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-android-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  instrumentation:
    name: Instrumentation (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: '26'
            target: google_apis
            arch: x86_64
          - api-level: '34'
            target: google_apis
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0777", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache generated Android runtime
        uses: actions/cache@v4
        with:
          path: |
            build/generated/runtime-assets
            build/generated/runtime-jni
          key: opencode-android-runtime-${{ runner.os }}-${{ hashFiles('runtime_tools/termux_assets.lock.json', 'runtime_tools/termux_assets.py', 'scripts/prepare_android_runtime_*.py') }}

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/avd/Pixel.avd
          key: avd-${{ matrix.api-level }}-${{ matrix.arch }}-${{ matrix.target }}-v1

      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: false
          script: echo "Generated AVD snapshot."

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: |
            ./gradlew connectedDebugAndroidTest --continue || true
            # The local runtime native libs target arm64-v8a/x86_64 hardware;
            # instrumentation tests that do not touch the runtime should pass.

      - name: Upload instrumentation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          if-no-files-found: ignore
